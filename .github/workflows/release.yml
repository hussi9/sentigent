name: release
on:
  push:
    tags: ["v*"]
jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions: { id-token: write, contents: read }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Verify tag matches pyproject version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python -c "
          import os, sys, tomllib
          tag = os.environ['TAG_NAME']
          tag_version = tag[1:] if tag.startswith('v') else tag
          with open('pyproject.toml', 'rb') as f:
              pyproject_version = tomllib.load(f)['project']['version']
          if tag_version != pyproject_version:
              sys.exit(
                  f'Tag {tag!r} (version {tag_version!r}) does not match '
                  f'pyproject.toml version {pyproject_version!r}. '
                  'Bump pyproject.toml or tag the correct version before releasing.'
              )
          print(f'OK: tag {tag!r} matches pyproject.toml version {pyproject_version!r}')
          "
      - run: pip install -e ".[dev,mcp]" && python -m pytest -q
      - run: pip install build && python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
